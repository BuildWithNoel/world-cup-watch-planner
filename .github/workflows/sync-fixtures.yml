name: Sync Knockout Fixtures

on:
  schedule:
    - cron: '0 9 * * *'   # Every day at 09:00 UTC
  workflow_dispatch:       # Allow manual trigger from GitHub Actions UI

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Run fixture sync
        env:
          API_FOOTBALL_DATA_KEY: ${{ secrets.API_FOOTBALL_DATA_KEY }}
        run: node scripts/sync-fixtures.js

      - name: Commit if changed
        run: |
          git config user.name  "fixture-sync[bot]"
          git config user.email "fixture-sync[bot]@users.noreply.github.com"
          git add latest-fixtures.json
          if git diff --staged --quiet; then
            echo "No changes — skipping commit"
          else
            git commit -m "chore: sync knockout fixtures [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git push
          fi
